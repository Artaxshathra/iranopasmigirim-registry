<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!-- frame-ancestors is intentionally omitted: it is ignored in <meta> form
       (browsers warn about it). On Tizen/webOS there is no parent frame; on
       the web we accept that the directive can only be enforced via header. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src https://hls.irannrtv.live; media-src https://hls.irannrtv.live blob:; object-src 'none'; base-uri 'self'; form-action 'none'">
  <title>INRTV Live</title>
  <link rel="stylesheet" href="player.css">
</head>
<body>
  <div id="player-container">
    <div id="video-area">
      <video id="video" autoplay aria-label="INRTV live stream"></video>

      <div id="audio-face" aria-hidden="true">
        <div class="audio-pulse"></div>
        <p class="audio-label">Audio only</p>
        <p class="audio-sub">INRTV · Live</p>
      </div>

      <div id="branding" class="branding" aria-hidden="true">INRTV</div>
    </div>

    <div id="overlay-error" hidden role="status" aria-live="polite">
      <p id="error-msg">Connection lost. Retrying...</p>
    </div>

    <div id="overlay-loading" role="status" aria-live="polite">
      <div class="spinner"></div>
      <p class="loading-caption">Connecting…</p>
    </div>

    <nav id="control-bar" hidden aria-label="Player controls">
      <button id="btn-play" type="button" class="ctrl" data-action="play" aria-label="Play or pause">
        <span class="ctrl-icon" aria-hidden="true">▶</span>
        <span class="ctrl-label">Play</span>
      </button>
      <button id="btn-audio" type="button" class="ctrl" data-action="audio" aria-pressed="false" aria-label="Toggle audio-only mode">
        <span class="ctrl-icon" aria-hidden="true">♪</span>
        <span class="ctrl-label">Audio only</span>
      </button>
    </nav>
  </div>

  <script src="lib/hls.min.js"></script>
  <script src="player.js"></script>
</body>
</html>
